spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:easysearch;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema-h2.sql
      data-locations: classpath:sql/data-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console
