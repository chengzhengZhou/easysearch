server:
  port: 8080

spring:
  profiles:
    active: dev
  application:
    name: easysearch-admin
  devtools:
    restart:
      enabled: true           # 启用自动重启
      additional-paths: src/main/java  # 额外监控的路径
      exclude: static/**,public/**     # 排除静态资源（变更时不触发重启）
    livereload:
      enabled: true           # 启用 LiveReload（浏览器自动刷新）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/easysearch?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: debug
